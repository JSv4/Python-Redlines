[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-redlines-ooxmlpowertools"
dynamic = ["version"]
description = "Open-XML-PowerTools redline engine binary for python-redlines."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [
  { name = "John Scrudato IV" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]

[project.urls]
Homepage = "https://github.com/JSv4/Python-Redlines"
Source = "https://github.com/JSv4/Python-Redlines"

# Version is single-sourced from the core package so all three release together.
[tool.hatch.version]
path = "../core/src/python_redlines/__about__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/python_redlines_ooxmlpowertools"]
artifacts = ["*.tar.gz", "*.zip"]

# Stamps the wheel with the correct platform tag based on the archive in _binaries/.
[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"
